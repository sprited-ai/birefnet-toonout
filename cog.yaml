# Replicate packaging for ToonOut (BiRefNet anime-finetune) matting.
build:
  gpu: true
  cuda: "12.1"
  python_version: "3.11"
  python_packages:
    - torch==2.4.0
    - torchvision==0.19.0
    - transformers==4.44.0
    - timm==1.0.9
    - einops==0.8.0
    - kornia==0.7.3
    - safetensors==0.4.4
    - huggingface_hub==0.24.6
    - pillow==10.4.0
  run:
    # bake the weights into the image so cold starts don't re-download 885MB
    - pip install "huggingface_hub[cli]==0.24.6"
    - hf download joelseytre/toonout birefnet_finetuned_toonout.pth --local-dir /weights
predict: "predict.py:Predictor"
